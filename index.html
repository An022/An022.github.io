<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <meta name="description" content="An Lee - RPG Adventure">
    <meta name="author" content="An Lee">
    <title>An Lee - RPG Adventure</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- RPG Game CSS -->
    <link rel="stylesheet" href="assets/css/rpg-game.css">
</head>

<body class="bg-pixel-dark text-white">
    <!-- Wake Up Animation Overlay -->
    <div id="wakeUpOverlay" class="wake-up-overlay"></div>
    
        <!-- Game Container -->
    <div id="gameContainer" class="game-container" style="display: none;">
        <!-- Status Bar -->
        <div class="status-bar">
            <div class="status-item">生命值: <span id="health">100</span></div>
            <div class="status-item">等級: <span id="level">1</span></div>
            <div class="status-item">經驗: <span id="experience">0</span></div>
            <div class="status-item">金幣: <span id="coins">0</span></div>
                </div>
                
        <!-- Room Scene -->
        <div id="roomScene" class="room-scene">
            <!-- Room Walls -->
            <div class="room-walls"></div>
            
            <!-- Room Floor -->
            <div class="room-floor"></div>
            
            <!-- Room Furniture -->
            <div class="room-furniture" id="desk"></div>
            <div class="room-bed" id="bed"></div>
            <div class="room-window" id="window"></div>
            
            <!-- Character -->
            <div class="character-container">
                <div id="character" class="character pixel-art"></div>
            </div>
        </div>
        
        <!-- UI Panel -->
        <div class="ui-panel">
            <div id="dialogueBox" class="dialogue-box">
                <p id="dialogueText">你慢慢睜開眼睛，發現自己躺在一個陌生的房間裡...</p>
            </div>
            <div class="action-buttons">
                <button id="lookAroundBtn" class="pixel-button">環顧四周</button>
                <button id="standUpBtn" class="pixel-button">站起來</button>
                <button id="checkInventoryBtn" class="pixel-button">檢查物品</button>
                <button id="examineDeskBtn" class="pixel-button secondary">檢查桌子</button>
                <button id="examineWindowBtn" class="pixel-button secondary">看向窗外</button>
            </div>
        </div>
        
        <!-- Inventory Panel -->
        <div id="inventoryPanel" class="inventory-panel">
            <h3 class="pixel-text text-center mb-4">物品欄</h3>
            <div id="inventoryGrid" class="inventory-grid">
                <!-- Inventory slots will be generated by JavaScript -->
            </div>
            <button id="closeInventoryBtn" class="pixel-button w-full mt-4">關閉</button>
                    </div>
                </div>
                
    <!-- Game Script -->
    <script>
        class RPGGame {
            constructor() {
                this.currentScene = 'wakeUp';
                this.characterState = 'lying';
                this.inventory = [];
                this.gameStats = {
                    health: 100,
                    level: 1,
                    experience: 0,
                    coins: 0
                };
                this.init();
            }
            
            init() {
                // Start wake up animation
                setTimeout(() => {
                    this.showRoomScene();
                }, 2000);
                
                this.setupEventListeners();
                this.initializeInventory();
                this.updateStats();
            }
            
            showRoomScene() {
                const wakeUpOverlay = document.getElementById('wakeUpOverlay');
                const gameContainer = document.getElementById('gameContainer');
                
                wakeUpOverlay.style.display = 'none';
                gameContainer.style.display = 'block';
                gameContainer.classList.add('animate-fade-in');
                
                // Add character animation
                const character = document.getElementById('character');
                character.classList.add('animate-pixel-bounce');
            }
            
            setupEventListeners() {
                document.getElementById('lookAroundBtn').addEventListener('click', () => {
                    this.lookAround();
                });
                
                document.getElementById('standUpBtn').addEventListener('click', () => {
                    this.standUp();
                });
                
                document.getElementById('checkInventoryBtn').addEventListener('click', () => {
                    this.showInventory();
                });
                
                document.getElementById('examineDeskBtn').addEventListener('click', () => {
                    this.examineDesk();
                });
                
                document.getElementById('examineWindowBtn').addEventListener('click', () => {
                    this.examineWindow();
                });
                
                document.getElementById('closeInventoryBtn').addEventListener('click', () => {
                    this.hideInventory();
                });
            }
            
            initializeInventory() {
                const inventoryGrid = document.getElementById('inventoryGrid');
                for (let i = 0; i < 12; i++) {
                    const slot = document.createElement('div');
                    slot.className = 'inventory-slot';
                    slot.textContent = i + 1;
                    inventoryGrid.appendChild(slot);
                }
            }
            
            updateStats() {
                document.getElementById('health').textContent = this.gameStats.health;
                document.getElementById('level').textContent = this.gameStats.level;
                document.getElementById('experience').textContent = this.gameStats.experience;
                document.getElementById('coins').textContent = this.gameStats.coins;
            }
            
            lookAround() {
                const dialogueText = document.getElementById('dialogueText');
                const messages = [
                    "你環顧四周，這是一個簡樸的房間...",
                    "牆壁是木質的，有一扇窗戶透進陽光...",
                    "房間裡有一張床、一個櫃子和一張桌子...",
                    "看起來像是某個小鎮的旅館房間...",
                    "你注意到桌子上似乎有什麼東西在發光..."
                ];
                
                let currentMessage = 0;
                this.typeText(dialogueText, messages[currentMessage]);
                
                // Cycle through messages
                const interval = setInterval(() => {
                    currentMessage++;
                    if (currentMessage < messages.length) {
                        this.typeText(dialogueText, messages[currentMessage]);
                    } else {
                        clearInterval(interval);
                        this.gainExperience(5);
                    }
                }, 3000);
            }
            
            standUp() {
                if (this.characterState === 'lying') {
                    this.characterState = 'standing';
                    const character = document.getElementById('character');
                    const dialogueText = document.getElementById('dialogueText');
                    
                    character.classList.add('standing');
                    this.typeText(dialogueText, "你慢慢站了起來，感覺身體有些僵硬...");
                    
                    // Update button text
                    document.getElementById('standUpBtn').textContent = '坐下';
                    this.gainExperience(3);
                } else {
                    this.characterState = 'lying';
                    const character = document.getElementById('character');
                    const dialogueText = document.getElementById('dialogueText');
                    
                    character.classList.remove('standing');
                    this.typeText(dialogueText, "你重新躺了下來，感覺需要更多休息...");
                    
                    // Update button text
                    document.getElementById('standUpBtn').textContent = '站起來';
                }
            }
            
            examineDesk() {
                const dialogueText = document.getElementById('dialogueText');
                this.typeText(dialogueText, "你走向桌子，發現上面有一把古老的鑰匙和一張紙條...");
                
                setTimeout(() => {
                    this.addToInventory('古老的鑰匙');
                    this.addToInventory('神秘的紙條');
                    this.gainExperience(10);
                    this.gainCoins(5);
                }, 2000);
            }
            
            examineWindow() {
                const dialogueText = document.getElementById('dialogueText');
                const messages = [
                    "你走向窗戶，看向外面...",
                    "外面是一個美麗的小鎮，陽光明媚...",
                    "你看到人們在街道上走動，生活看起來很平靜...",
                    "遠處有一座古老的城堡，看起來很神秘..."
                ];
                
                let currentMessage = 0;
                this.typeText(dialogueText, messages[currentMessage]);
                
                const interval = setInterval(() => {
                    currentMessage++;
                    if (currentMessage < messages.length) {
                        this.typeText(dialogueText, messages[currentMessage]);
                    } else {
                        clearInterval(interval);
                        this.gainExperience(8);
                    }
                }, 2500);
            }
            
            showInventory() {
                const inventoryPanel = document.getElementById('inventoryPanel');
                inventoryPanel.classList.add('show');
                this.updateInventoryDisplay();
            }
            
            hideInventory() {
                const inventoryPanel = document.getElementById('inventoryPanel');
                inventoryPanel.classList.remove('show');
            }
            
            updateInventoryDisplay() {
                const slots = document.querySelectorAll('.inventory-slot');
                slots.forEach((slot, index) => {
                    if (index < this.inventory.length) {
                        slot.classList.add('filled');
                        slot.textContent = this.inventory[index];
                    } else {
                        slot.classList.remove('filled');
                        slot.textContent = index + 1;
                    }
                });
            }
            
            addToInventory(item) {
                if (this.inventory.length < 12) {
                    this.inventory.push(item);
                    this.updateInventoryDisplay();
                    const dialogueText = document.getElementById('dialogueText');
                    this.typeText(dialogueText, `你獲得了：${item}`);
                }
            }
            
            gainExperience(amount) {
                this.gameStats.experience += amount;
                this.updateStats();
                
                // Check for level up
                if (this.gameStats.experience >= this.gameStats.level * 100) {
                    this.levelUp();
                }
            }
            
            gainCoins(amount) {
                this.gameStats.coins += amount;
                this.updateStats();
            }
            
            levelUp() {
                this.gameStats.level++;
                this.gameStats.experience = 0;
                this.gameStats.health = 100; // Full heal on level up
                this.updateStats();
                
                const dialogueText = document.getElementById('dialogueText');
                this.typeText(dialogueText, `恭喜！你升級了！現在是等級 ${this.gameStats.level}！`);
            }
            
            typeText(element, text) {
                element.textContent = '';
                let i = 0;
                const typeInterval = setInterval(() => {
                    if (i < text.length) {
                        element.textContent += text.charAt(i);
                        i++;
                    } else {
                        clearInterval(typeInterval);
                    }
                }, 50);
            }
        }
        
        // Initialize game when page loads
        document.addEventListener('DOMContentLoaded', () => {
            new RPGGame();
        });
    </script>
</body>
</html>
